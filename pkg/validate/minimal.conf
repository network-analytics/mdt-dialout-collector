# Minimal config for package validation. Listens on loopback, uses
# zmq delivery so we don't need a kafka broker for the test. The
# validate-package CI job only checks that the daemon starts, binds the
# vendor sockets, and stays alive — no real telemetry flows.

iface = "lo";
writer_id = "validate";
core_pid_folder = "/tmp/";

socket_cisco   = "127.0.0.1:20007";
socket_juniper = "127.0.0.1:20008";
socket_nokia   = "127.0.0.1:20009";
socket_huawei  = "127.0.0.1:20010";

cisco_workers   = "1";
juniper_workers = "1";
nokia_workers   = "1";
huawei_workers  = "1";

replies_cisco   = "0";
replies_juniper = "0";
replies_nokia   = "0";
replies_huawei  = "0";

so_bindtodevice_check = "false";

enable_cisco_gpbkv2json             = "true";
enable_cisco_message_to_json_string = "false";

data_delivery_method = "zmq";
bootstrap_servers    = "dummy:9092";
topic                = "dummy";
security_protocol    = "plaintext";
log_level            = "0";

console_log = "true";
syslog      = "false";
spdlog_level = "info";
