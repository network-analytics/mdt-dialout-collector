! Minimal pmtelemetryd config that exercises the embedded gRPC dial-out
! collector via libgrpc_collector and emits to kafka. All values match
! the e2e harness — same redpanda broker and same topic naming as the
! standalone collector test.

! Generic
core_proc_name: pmtelemetryd-grpc
pidfile:        /var/run/pmtelemetryd.pid
logfile:        /var/log/pmacct/pmtelemetryd.log
!
! gRPC dial-out (embedded collector via libgrpc_collector.so)
telemetry_daemon_decoder:                json
telemetry_daemon_grpc_collector_conf:    /etc/pmacct/grpc-dialout.conf
!
! Kafka output for the assertions
telemetry_daemon_msglog_output:          json
telemetry_daemon_msglog_kafka_topic:     mdt-e2e-pmtd
telemetry_daemon_msglog_kafka_config_file: /etc/pmacct/kafka.conf
