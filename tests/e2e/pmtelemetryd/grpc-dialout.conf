# mdt-dialout-collector config when running EMBEDDED inside pmtelemetryd.
# Output is via ZMQ (ipc:///tmp/grpc.sock) which pmtelemetryd's polling
# thread consumes. Do not set kafka here — pmtelemetryd handles that.

iface                                = "eth0";
writer_id                            = "e2e-pmtd-writer";
core_pid_folder                      = "/tmp/";

socket_cisco                    = "0.0.0.0:10007";
socket_juniper                  = "0.0.0.0:10008";
socket_nokia                    = "0.0.0.0:10009";
socket_huawei                   = "0.0.0.0:10010";

cisco_workers                        = "1";
juniper_workers                      = "1";
nokia_workers                        = "1";
huawei_workers                       = "1";

replies_cisco                        = "0";
replies_juniper                      = "0";
replies_nokia                        = "0";
replies_huawei                       = "0";

so_bindtodevice_check                = "false";

data_delivery_method                 = "zmq";

# Cisco: GPB-KV is what real routers send; convert to JSON so it survives
# through pmtelemetryd's json telemetry_daemon_decoder.
enable_cisco_gpbkv2json              = "true";
enable_cisco_message_to_json_string  = "false";

console_log                          = "true";
syslog                               = "false";
spdlog_level                         = "info";
