# e2e harness collector config.
# All values are strings — libconfig parsing requires it.

iface = "eth0";
writer_id = "e2e-writer";
core_pid_folder = "/tmp/";

socket_cisco = "0.0.0.0:10007";
socket_juniper = "0.0.0.0:10008";
socket_nokia = "0.0.0.0:10009";
socket_huawei = "0.0.0.0:10010";

cisco_workers = "1";
juniper_workers = "1";
nokia_workers = "1";
huawei_workers = "1";

# Unlimited streaming (the canonical production setting). The async-stream
# rewrite (#7) reacts correctly to client half-close, so a finite cap is
# no longer required as a workaround.
replies_cisco = "0";
replies_juniper = "0";
replies_nokia = "0";
replies_huawei = "0";

so_bindtodevice_check = "false";

data_delivery_method = "kafka";

# Data manipulation: convert Cisco GPB-KV to JSON so the test can grep.
enable_cisco_gpbkv2json = "true";
enable_cisco_message_to_json_string = "false";

# Kafka producer
bootstrap_servers = "broker:9092";
topic = "mdt-e2e";
client_id = "mdt-e2e-collector";
security_protocol = "plaintext";
log_level = "0";

# logging
console_log = "true";
syslog = "false";
spdlog_level = "info";
