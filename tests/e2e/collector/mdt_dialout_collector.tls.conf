# Same as mdt_dialout_collector.conf but with TLS enabled.
# Cert/key are baked into the image at /etc/mdt-tls/.

iface = "eth0";
writer_id = "e2e-tls-writer";
core_pid_folder = "/tmp/";

socket_cisco = "0.0.0.0:10007";
socket_juniper = "0.0.0.0:10008";
socket_nokia = "0.0.0.0:10009";
socket_huawei = "0.0.0.0:10010";

cisco_workers = "1";
juniper_workers = "1";
nokia_workers = "1";
huawei_workers = "1";

replies_cisco = "0";
replies_juniper = "0";
replies_nokia = "0";
replies_huawei = "0";

so_bindtodevice_check = "false";

# TLS — server-side
enable_tls     = "true";
tls_cert_path  = "/etc/mdt-tls/server.crt";
tls_key_path   = "/etc/mdt-tls/server.key";

data_delivery_method = "kafka";

enable_cisco_gpbkv2json = "true";
enable_cisco_message_to_json_string = "false";

bootstrap_servers = "broker:9092";
topic = "mdt-e2e";
client_id = "mdt-e2e-collector-tls";
security_protocol = "plaintext";
log_level = "0";

console_log = "true";
syslog = "false";
spdlog_level = "info";
