# Same as mdt_dialout_collector.conf but listens on the IPv6 wildcard
# [::] for every vendor. On Linux the dual-stack default (IPV6_V6ONLY=0)
# accepts v4-mapped connections too, so the existing python clients
# work unchanged — gRPC reports the peer as ipv6:[::ffff:a.b.c.d]:port,
# which exercises the IPv6 branch of ParsePeer().

iface = "eth0";
writer_id = "e2e-ipv6-writer";
core_pid_folder = "/tmp/";

socket_cisco   = "[::]:10007";
socket_juniper = "[::]:10008";
socket_nokia   = "[::]:10009";
socket_huawei  = "[::]:10010";

cisco_workers = "1";
juniper_workers = "1";
nokia_workers = "1";
huawei_workers = "1";

replies_cisco = "0";
replies_juniper = "0";
replies_nokia = "0";
replies_huawei = "0";

so_bindtodevice_check = "false";

data_delivery_method = "kafka";

enable_cisco_gpbkv2json = "true";
enable_cisco_message_to_json_string = "false";

bootstrap_servers = "broker:9092";
topic = "mdt-e2e";
client_id = "mdt-e2e-collector-ipv6";
security_protocol = "plaintext";
log_level = "0";

console_log = "true";
syslog = "false";
spdlog_level = "info";
